type School @model @auth(rules: [
  { allow: public, provider: apiKey, operations: [read] },
  { allow: private, provider: iam }
]) {
  id: ID!
  name: String!
  address: String
  students: [Student] @hasMany
  teachers: [Teacher] @hasMany(indexName: "bySchool", fields: ["id"])
  classes: [Class] @hasMany(indexName: "bySchool", fields: ["id"])
  incidents: [Incident] @hasMany(indexName: "bySchool", fields: ["id"])
}

type Parent @model @auth(rules: [
  { allow: owner },
  { allow: private, operations: [read] },
  { allow: public, provider: apiKey }
]) {
  id: ID!
  cognitoUserId: String @index(name: "byCognitoUser")
  firstName: String!
  lastName: String!
  phoneNumber: String
  canEditRecords: Boolean
  students: [Student] @manyToMany(relationName: "ParentStudents")
}

type Student @model @auth(rules: [
  { allow: private, operations: [read] },
  { allow: groups, groups: ["Teachers"], operations: [read, update] },
  { allow: public, provider: apiKey }
]) {
  id: ID!
  firstName: String!
  lastName: String!
  dateOfBirth: AWSDate
  gradeLevel: Int
  attendanceRate: Float
  currentStatus: String
  school: School @belongsTo
  parents: [Parent] @manyToMany(relationName: "ParentStudents")
  enrollments: [Enrollment] @hasMany(indexName: "byStudent", fields: ["id"])
  attendances: [Attendance] @hasMany(indexName: "byStudent", fields: ["id"])
  incidents: [Incident] @hasMany(indexName: "byStudent", fields: ["id"])
  medicalRecord: MedicalRecord @hasOne
}

type Teacher @model @auth(rules: [{ allow: public }]) {
  id: ID!
  name: String!
  cognitoUserId: String @index(name: "byCognitoUser")
  schoolId: ID! @index(name: "bySchool")
  school: School @belongsTo(fields: ["schoolId"])
  classes: [Class] @hasMany(indexName: "byTeacher", fields: ["id"])
  incidents: [Incident] @hasMany(indexName: "byTeacher", fields: ["id"])
}

type Class @model @auth(rules: [{ allow: public }]) {
  id: ID!
  name: String!
  teacherId: ID! @index(name: "byTeacher")
  schoolId: ID! @index(name: "bySchool")
  teacher: Teacher @belongsTo(fields: ["teacherId"])
  school: School @belongsTo(fields: ["schoolId"])
  enrollments: [Enrollment] @hasMany(indexName: "byClass", fields: ["id"])
  attendances: [Attendance] @hasMany(indexName: "byClass", fields: ["id"])
  incidents: [Incident] @hasMany(indexName: "byClass", fields: ["id"])
}
# Separate Schedule model
enum DayOfWeek { MONDAY TUESDAY WEDNESDAY THURSDAY FRIDAY SATURDAY SUNDAY }

type Schedule @model @auth(rules: [{ allow: public }]) {
  id: ID!
  classId: ID! @index(name: "byClass")
  class: Class @belongsTo(fields: ["classId"])
  dayOfWeek: DayOfWeek!
  startTime: AWSTime!
  endTime: AWSTime!
}

type Enrollment @model @auth(rules: [{ allow: public }]) {
  id: ID!
  studentId: ID! @index(name: "byStudent")
  classId: ID! @index(name: "byClass")
  currentGrade: Float
  student: Student @belongsTo(fields: ["studentId"])
  class: Class @belongsTo(fields: ["classId"])
}
type Attendance @model @auth(rules: [{ allow: public }]) {
  id: ID!
  studentId: ID! @index(name: "byStudent")
  classId: ID! @index(name: "byClass")
  date: AWSDate!
  status: AttendanceStatus!
  student: Student @belongsTo(fields: ["studentId"])
  checkInTime: AWSDateTime        # Optional: when student checked in
  updatedAt: AWSDateTime          # Optional: last update timestamp
  class: Class @belongsTo(fields: ["classId"])
}

enum AttendanceStatus {
  PRESENT
  ABSENT
  LATE
}
type Announcement @model @auth(rules: [{ allow: public }]) {
  id: ID!
  title: String!
  body: String!
  createdAt: AWSDateTime!
  createdBy: ID!
  schoolId: ID @index(name: "bySchool")
  classId: ID @index(name: "byClass")
}

type MedicalRecord @model @auth(rules: [{ allow: public }]) {
  id: ID!

  studentId: ID! @index(name: "byStudent")

  allergies: String
  medications: String
  conditions: String
  emergencyNotes: String

  student: Student @belongsTo(fields: ["studentId"])
}

type Incident @model @auth(rules: [{ allow: public }]) {
  id: ID!

  description: String!
  severity: String
  date: AWSDate

  teacherId: ID! @index(name: "byTeacher")
  studentId: ID! @index(name: "byStudent")
  classId: ID @index(name: "byClass")
  schoolId: ID! @index(name: "bySchool")

  teacher: Teacher @belongsTo(fields: ["teacherId"])
  student: Student @belongsTo(fields: ["studentId"])
  class: Class @belongsTo(fields: ["classId"])
  school: School @belongsTo(fields: ["schoolId"])
}

# ── Messaging ────────────────────────────────────────────────────────
# DIRECT = 1:1 parent↔teacher thread about a specific student
# GROUP  = teacher broadcast to all parents in a class
enum ConversationType { DIRECT  GROUP }
enum SenderType       { PARENT  TEACHER }

# Each conversation stores denormalized names so the inbox list
# can render without extra lookups (avoids N+1 on every load).
type Conversation @model @auth(rules: [{ allow: public }]) {
  id: ID!
  type: ConversationType!
  parentId:  ID @index(name: "byParent")
  teacherId: ID! @index(name: "byTeacher")
  studentId: ID @index(name: "byStudent")
  classId:   ID @index(name: "byClass")
  parentName:  String
  teacherName: String
  studentName: String
  className:   String
  lastMessageText: String
  lastMessageAt:   AWSDateTime
  messages: [Message] @hasMany(indexName: "byConversation", fields: ["id"])
}

# Messages are sorted by createdAt within their conversation via the
# composite sort key on the byConversation GSI.
type Message @model @auth(rules: [{ allow: public }]) {
  id: ID!
  conversationId: ID! @index(name: "byConversation", sortKeyFields: ["createdAt"])
  senderId:   ID!
  senderType: SenderType!
  senderName: String!
  body:       String!
  createdAt:  AWSDateTime!
  conversation: Conversation @belongsTo(fields: ["conversationId"])
}
